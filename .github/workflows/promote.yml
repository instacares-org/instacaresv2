name: Promote to Production

# ============================================================================
# ONE-CLICK PROMOTION: develop → main
# ============================================================================
# Creates a PR from develop to main with auto-generated changelog.
# After you review and merge the PR, production deploys automatically.
#
# Usage: Go to Actions → "Promote to Production" → Run workflow
# ============================================================================

on:
  workflow_dispatch:
    inputs: {}

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: diff
        run: |
          git fetch origin main develop
          COMMITS=$(git log origin/main..origin/develop --oneline)
          if [ -z "$COMMITS" ]; then
            echo "No new commits to promote. develop is up to date with main."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Generate changelog
          CHANGELOG=$(git log origin/main..origin/develop --pretty=format:"- %s (%h)" --reverse)
          echo "commit_count=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

          # Save changelog to file (handles multiline)
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.txt)
          DATE=$(date +%Y-%m-%d)
          COMMIT_COUNT=${{ steps.diff.outputs.commit_count }}

          # Check if a release PR already exists
          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Release PR #${EXISTING} already exists. Updating it..."
            gh pr edit "$EXISTING" --body "$(cat <<EOF
## Release to Production — ${DATE}

**${COMMIT_COUNT} commits** from \`develop\` → \`main\`

### Changes
${CHANGELOG}

### Deployment
Once this PR is merged, production will deploy automatically:
1. CI quality gates run (lint, type-check, tests, build)
2. Deploy to instacares.net via SSH
3. Smoke tests verify the deployment
4. Auto-rollback if smoke tests fail

### Pre-merge Checklist
- [ ] Changes tested on staging (instacares.com)
- [ ] No broken features on staging
- [ ] Database migrations reviewed (if any)

---
🤖 Auto-generated by Promote to Production workflow
EOF
)"
            echo "Updated PR #${EXISTING}"
            echo "PR URL: https://github.com/${{ github.repository }}/pull/${EXISTING}"
            exit 0
          fi

          # Create new PR
          PR_URL=$(gh pr create \
            --base main \
            --head develop \
            --title "Release ${DATE}: ${COMMIT_COUNT} changes to production" \
            --body "$(cat <<EOF
## Release to Production — ${DATE}

**${COMMIT_COUNT} commits** from \`develop\` → \`main\`

### Changes
${CHANGELOG}

### Deployment
Once this PR is merged, production will deploy automatically:
1. CI quality gates run (lint, type-check, tests, build)
2. Deploy to instacares.net via SSH
3. Smoke tests verify the deployment
4. Auto-rollback if smoke tests fail

### Pre-merge Checklist
- [ ] Changes tested on staging (instacares.com)
- [ ] No broken features on staging
- [ ] Database migrations reviewed (if any)

---
🤖 Auto-generated by Promote to Production workflow
EOF
)")
          echo "Created PR: ${PR_URL}"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.has_changes }}" = "false" ]; then
            echo "## No Changes to Promote" >> $GITHUB_STEP_SUMMARY
            echo "The \`develop\` branch is already up to date with \`main\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Release PR Created" >> $GITHUB_STEP_SUMMARY
            echo "- **Commits:** ${{ steps.diff.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Flow:** develop → main → auto-deploy to instacares.net" >> $GITHUB_STEP_SUMMARY
            echo "- **Next step:** Review and merge the PR" >> $GITHUB_STEP_SUMMARY
          fi
