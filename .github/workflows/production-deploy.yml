name: Production Deployment

# ============================================================================
# AUTO-DEPLOY ON MERGE TO MAIN + MANUAL TRIGGER
# ============================================================================
# This workflow deploys to production (instacares.com) on Hostinger VPS.
#
# Triggers:
#   1. Automatically when a PR is merged into main
#   2. Manually via workflow_dispatch (type "deploy" to confirm)
#
# Workflow: develop → staging (auto) → PR to main → production (auto)
# ============================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy" to confirm manual production deployment'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  APP_NAME: 'instacares'

jobs:
  # Confirmation Check (only for manual triggers)
  confirm:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy" ]; then
            echo "Deployment cancelled. You must type 'deploy' to confirm."
            exit 1
          fi
          echo "Deployment confirmed by ${{ github.actor }}"

  # Build and Test Job
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: confirm
    if: always() && (needs.confirm.result == 'success' || needs.confirm.result == 'skipped')

    outputs:
      version: ${{ steps.version.outputs.version }}
      build-success: ${{ steps.build.outputs.success }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        run: |
          VERSION="v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --force

      - name: Create minimal env file
        run: |
          echo "DATABASE_URL=file:./dev.db" > .env
          echo "SKIP_ENV_VALIDATION=true" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Unit Tests
        run: npm test

      - name: Build Application
        id: build
        run: |
          export NODE_ENV=production
          export SKIP_ENV_VALIDATION=true
          npm run build
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version:** ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Deploy to Hostinger
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [confirm, build-and-test]
    if: always() && needs.build-and-test.result == 'success' && needs.build-and-test.outputs.build-success == 'true'

    environment:
      name: production
      url: https://instacares.com

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.60.71.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare Deployment Info
        id: deploy-info
        run: |
          VERSION="${{ needs.build-and-test.outputs.version }}"
          DEPLOY_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "deploy-time=${DEPLOY_TIME}" >> $GITHUB_OUTPUT

      - name: Deploy to Production Server
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ConnectTimeout=30 root@72.60.71.43 << 'DEPLOY_EOF'
          set -e
          echo "=== Production deployment started at $(date) ==="

          cd /var/www/instacaresv2

          # Ensure git repo is initialized (first-time setup)
          if [ ! -d .git ]; then
            echo "Initializing git repo..."
            git init
            git remote add origin https://github.com/instacares-org/instacaresv2.git
          fi

          # Backup current version
          echo "Creating backup..."
          mkdir -p /var/backups/instacares
          tar -czf "/var/backups/instacares/backup-$(date +%Y%m%d-%H%M%S).tar.gz" \
            --exclude=node_modules --exclude=.next --exclude=.git \
            . 2>/dev/null || echo "Backup created (some warnings ok)"

          # Pull latest code from main
          echo "Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main

          # Clean untracked files from src (leftover debug files break build)
          git clean -fd src/

          # Install dependencies
          echo "Installing dependencies..."
          npm ci --prefer-offline --no-audit --force

          # Generate Prisma client
          echo "Generating Prisma client..."
          npx prisma generate

          # Extract DATABASE_URL from PM2 (needed for migrations and build)
          echo "Extracting environment from PM2..."
          PROD_ID=$(pm2 id instacares 2>/dev/null | tr -d '[]' || echo "")
          if [ -n "$PROD_ID" ]; then
            export DATABASE_URL="$(pm2 env $PROD_ID 2>/dev/null | grep '^DATABASE_URL' | sed 's/^DATABASE_URL: //')"
          fi

          # Run database migrations
          echo "Running database migrations..."
          npx prisma migrate deploy || echo "Migration completed (or no pending migrations)"

          # Build application (DATABASE_URL needed for Prisma client init at build time)
          echo "Building application..."
          export SKIP_ENV_VALIDATION=true
          npm run build

          # Restart services (preserves PM2 environment variables)
          echo "Restarting services..."
          pm2 restart instacares --update-env || pm2 start ecosystem.config.js --env production
          pm2 restart socket-server --update-env || true
          pm2 save

          echo "=== Production deployment completed at $(date) ==="
          DEPLOY_EOF

      - name: Smoke Tests
        run: |
          echo "Running production smoke tests..."
          sleep 10

          ssh -o StrictHostKeyChecking=no root@72.60.71.43 << 'SMOKE_EOF'
          PASS=0
          FAIL=0

          # Test 1: Homepage
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005)
          if echo "$STATUS" | grep -qE "200|302"; then
            echo "Homepage: HTTP $STATUS - PASS"
            PASS=$((PASS+1))
          else
            echo "Homepage: HTTP $STATUS - FAIL"
            FAIL=$((FAIL+1))
          fi

          # Test 2: Health API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Health API: HTTP $STATUS - PASS"
            PASS=$((PASS+1))
          else
            echo "Health API: HTTP $STATUS - FAIL"
            FAIL=$((FAIL+1))
          fi

          # Test 3: Caregivers API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005/api/caregivers)
          if echo "$STATUS" | grep -qE "200|304"; then
            echo "Caregivers API: HTTP $STATUS - PASS"
            PASS=$((PASS+1))
          else
            echo "Caregivers API: HTTP $STATUS - FAIL"
            FAIL=$((FAIL+1))
          fi

          # Test 4: PM2 status
          if pm2 list | grep -q "instacares.*online"; then
            echo "PM2 process: online - PASS"
            PASS=$((PASS+1))
          else
            echo "PM2 process: not online - FAIL"
            FAIL=$((FAIL+1))
          fi

          echo ""
          echo "Smoke tests: $PASS passed, $FAIL failed"

          if [ "$FAIL" -gt 0 ]; then
            echo "Some smoke tests failed - check logs"
            pm2 logs instacares --lines 20 --nostream || true
            exit 1
          fi
          SMOKE_EOF

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.deploy-info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed At:** ${{ steps.deploy-info.outputs.deploy-time }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://instacares.com" >> $GITHUB_STEP_SUMMARY

  # Rollback job (on failure)
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-production]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.60.71.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rollback to Previous Version
        run: |
          echo "Deployment failed, checking for rollback..."

          ssh -o StrictHostKeyChecking=no root@72.60.71.43 << 'ROLLBACK_EOF'
          cd /var/www/instacaresv2

          # Check for backup BEFORE stopping anything
          LATEST_BACKUP=$(ls -t /var/backups/instacares/backup-*.tar.gz 2>/dev/null | head -n 1)

          if [ -z "$LATEST_BACKUP" ]; then
            echo "No backup found - attempting to restart current version instead"
            pm2 restart instacares --update-env || true
            pm2 restart socket-server --update-env || true
            pm2 save
            echo "Restarted existing processes"
            exit 0
          fi

          echo "Rolling back to: $LATEST_BACKUP"

          # Stop services only after confirming backup exists
          pm2 stop instacares || true
          pm2 stop socket-server || true

          # Restore from backup
          tar -xzf "$LATEST_BACKUP" -C /var/www/instacaresv2/

          # Rebuild after rollback
          npm ci --prefer-offline --no-audit --force
          npx prisma generate

          # Extract DATABASE_URL for build
          PROD_ID=$(pm2 id instacares 2>/dev/null | tr -d '[]' || echo "")
          if [ -n "$PROD_ID" ]; then
            export DATABASE_URL="$(pm2 env $PROD_ID 2>/dev/null | grep '^DATABASE_URL' | sed 's/^DATABASE_URL: //')"
          fi
          export SKIP_ENV_VALIDATION=true
          npm run build

          # Restart services (preserves PM2 environment variables)
          pm2 restart instacares --update-env || pm2 start ecosystem.config.js --env production
          pm2 restart socket-server --update-env || true
          pm2 save

          echo "Rollback completed"
          ROLLBACK_EOF
