name: Staging Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  # Quality gates (same as CI)
  quality:
    name: Lint, Type-Check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --force

      - name: Create minimal env file
        run: |
          echo "DATABASE_URL=file:./dev.db" > .env
          echo "SKIP_ENV_VALIDATION=true" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Build
        run: |
          export SKIP_ENV_VALIDATION=true
          npm run build

  # Deploy to Hostinger VPS
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality

    environment:
      name: staging
      url: https://instacares.com

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.60.71.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Staging Server
        run: |
          ssh -o StrictHostKeyChecking=no root@72.60.71.43 << 'DEPLOY_EOF'
          set -e
          echo "=== Staging deployment started at $(date) ==="

          cd /var/www/instacares-staging

          # Pull latest develop branch
          echo "Pulling latest code..."
          git fetch origin develop
          git reset --hard origin/develop

          # Install dependencies
          echo "Installing dependencies..."
          npm ci --prefer-offline --no-audit --force

          # Generate Prisma client
          echo "Generating Prisma client..."
          npx prisma generate

          # Build with env vars from PM2
          echo "Building application..."
          eval $(pm2 env $(pm2 id instacares-staging 2>/dev/null || echo 0) 2>/dev/null | grep -E '^(DATABASE_URL|NEXTAUTH_SECRET|NEXTAUTH_URL|NEXT_PUBLIC)' | sed 's/: /="/' | sed 's/$/"/' | sed 's/^/export /' 2>/dev/null) || true
          export SKIP_ENV_VALIDATION=true
          npm run build

          # Restart only staging processes
          echo "Restarting staging processes..."
          pm2 restart instacares-staging --update-env || pm2 start ecosystem.staging.config.js
          pm2 restart socket-server-staging --update-env || true
          pm2 save

          # Health check
          echo "Health check..."
          sleep 5
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:3007 | grep -qE "200|302"; then
            echo "Staging is healthy!"
          else
            echo "WARNING: Health check returned unexpected status"
            pm2 logs instacares-staging --lines 20 --nostream || true
          fi

          echo "=== Staging deployment completed at $(date) ==="
          DEPLOY_EOF

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://instacares.com" >> $GITHUB_STEP_SUMMARY
