name: Staging Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  # Quality gates
  quality:
    name: Lint, Type-Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit --force

      - name: Create minimal env file
        run: |
          echo "DATABASE_URL=file:./dev.db" > .env
          echo "SKIP_ENV_VALIDATION=true" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Unit Tests
        run: npm test

      - name: Build
        run: |
          export SKIP_ENV_VALIDATION=true
          npm run build

  # Deploy to Hostinger VPS
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality

    environment:
      name: staging
      url: https://instacares.com

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.60.71.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Staging Server
        run: |
          ssh -o StrictHostKeyChecking=no root@72.60.71.43 << 'DEPLOY_EOF'
          set -e
          echo "=== Staging deployment started at $(date) ==="

          cd /var/www/instacares-staging

          # Pull latest develop branch
          echo "Pulling latest code..."
          git fetch origin develop
          git reset --hard origin/develop

          # Ensure uploads symlink exists (points to production uploads)
          if [ ! -L public/uploads ]; then
            rm -rf public/uploads
            ln -s /var/www/instacaresv2/public/uploads public/uploads
            echo "Recreated uploads symlink"
          fi

          # Install dependencies
          echo "Installing dependencies..."
          npm ci --prefer-offline --no-audit --force

          # Generate Prisma client
          echo "Generating Prisma client..."
          npx prisma generate

          # Build with env vars from PM2
          echo "Building application..."
          STAGING_ID=$(pm2 id instacares-staging 2>/dev/null | tr -d '[]' || echo "")
          if [ -n "$STAGING_ID" ]; then
            export DATABASE_URL="$(pm2 env $STAGING_ID 2>/dev/null | grep '^DATABASE_URL' | sed 's/^DATABASE_URL: //')"
            export NEXTAUTH_SECRET="$(pm2 env $STAGING_ID 2>/dev/null | grep '^NEXTAUTH_SECRET' | sed 's/^NEXTAUTH_SECRET: //')"
          fi
          export SKIP_ENV_VALIDATION=true
          export NEXTAUTH_URL="https://instacares.com"
          export NEXT_PUBLIC_BASE_URL="https://instacares.com"
          npm run build

          # Restart only staging processes
          echo "Restarting staging processes..."
          pm2 restart instacares-staging --update-env || pm2 start ecosystem.staging.config.js
          pm2 restart socket-server-staging --update-env || true
          pm2 save

          echo "=== Staging deployment completed at $(date) ==="
          DEPLOY_EOF

      - name: Smoke Tests
        run: |
          echo "Running smoke tests against staging..."
          sleep 8

          ssh -o StrictHostKeyChecking=no root@72.60.71.43 << 'SMOKE_EOF'
          PASS=0
          FAIL=0

          # Test 1: Homepage loads
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3007)
          if echo "$STATUS" | grep -qE "200|302"; then
            echo "✅ Homepage: HTTP $STATUS"
            PASS=$((PASS+1))
          else
            echo "❌ Homepage: HTTP $STATUS"
            FAIL=$((FAIL+1))
          fi

          # Test 2: Health endpoint
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3007/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health API: HTTP $STATUS"
            PASS=$((PASS+1))
          else
            echo "❌ Health API: HTTP $STATUS"
            FAIL=$((FAIL+1))
          fi

          # Test 3: Caregivers API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3007/api/caregivers)
          if echo "$STATUS" | grep -qE "200|304"; then
            echo "✅ Caregivers API: HTTP $STATUS"
            PASS=$((PASS+1))
          else
            echo "❌ Caregivers API: HTTP $STATUS"
            FAIL=$((FAIL+1))
          fi

          # Test 4: Static assets
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3007/robots.txt)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Static assets: HTTP $STATUS"
            PASS=$((PASS+1))
          else
            echo "❌ Static assets: HTTP $STATUS"
            FAIL=$((FAIL+1))
          fi

          echo ""
          echo "Smoke tests: $PASS passed, $FAIL failed"

          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ Some smoke tests failed"
            pm2 logs instacares-staging --lines 15 --nostream || true
            exit 1
          fi
          SMOKE_EOF

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://instacares.com" >> $GITHUB_STEP_SUMMARY
