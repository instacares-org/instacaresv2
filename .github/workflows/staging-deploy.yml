name: Staging Deployment

on:
  # Auto-deploy on push to develop branch
  push:
    branches: [ develop ]

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  APP_NAME: 'instacares'
  STAGING_HOST: '10.0.0.56'
  STAGING_USER: 'faradyoo7'
  STAGING_PATH: '~/instacares_v2'

jobs:
  # Build and Test Job
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      build-success: ${{ steps.build.outputs.success }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Create minimal env file
        run: |
          echo "DATABASE_URL=file:./dev.db" > .env
          echo "SKIP_ENV_VALIDATION=true" >> .env

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Unit Tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: npm test

      - name: Build Application
        id: build
        run: |
          export NODE_ENV=production
          export SKIP_ENV_VALIDATION=true
          npm run build
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Build Summary
        run: |
          echo "## Staging Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status:** Success" >> $GITHUB_STEP_SUMMARY

  # Deploy to Ubuntu Staging Server
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ needs.build-and-test.outputs.build-success == 'true' }}

    environment:
      name: staging
      url: http://10.0.0.56:3005

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Prepare Deployment Info
        id: deploy-info
        run: |
          COMMIT_MSG="$(git log -1 --pretty=format:'%s')"
          COMMIT_AUTHOR="$(git log -1 --pretty=format:'%an')"
          DEPLOY_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          echo "commit-msg=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "commit-author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT
          echo "deploy-time=${DEPLOY_TIME}" >> $GITHUB_OUTPUT

      - name: Deploy to Staging Server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST || '10.0.0.56' }}
          STAGING_USER: ${{ secrets.STAGING_USER || 'faradyoo7' }}
        run: |
          echo "Starting deployment to Staging..."

          # Add staging host to known hosts
          mkdir -p ~/.ssh
          ssh-keyscan -H ${STAGING_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy script
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 ${STAGING_USER}@${STAGING_HOST} << 'DEPLOY_EOF'
          set -e

          echo "Deployment started on $(date)"

          cd ~/instacares_v2

          # Pull latest code
          echo "Pulling latest code from develop branch..."
          git fetch --all
          git checkout develop 2>/dev/null || git checkout -b develop origin/develop
          git reset --hard origin/develop
          git pull origin develop

          # Rebuild Docker containers
          echo "Rebuilding Docker containers..."
          docker compose down || true
          docker compose build --no-cache
          docker compose up -d

          # Wait for containers to be healthy
          echo "Waiting for containers to be healthy..."
          sleep 15

          # Run Prisma migrations inside container
          echo "Running database migrations..."
          docker compose exec -T app npx prisma migrate deploy || echo "Migration completed"

          # Health check
          echo "Performing health check..."
          if docker compose ps | grep -q "Up"; then
            echo "Staging deployment successful!"
            docker compose ps
          else
            echo "Deployment may have issues"
            docker compose logs --tail=50
            exit 1
          fi

          echo "Staging deployment completed at $(date)"
          DEPLOY_EOF

      - name: Verify Deployment
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST || '10.0.0.56' }}
          STAGING_USER: ${{ secrets.STAGING_USER || 'faradyoo7' }}
        run: |
          echo "Verifying staging deployment..."

          ssh -o StrictHostKeyChecking=no ${STAGING_USER}@${STAGING_HOST} << 'VERIFY_EOF'
          cd ~/instacares_v2

          echo "=== Docker Container Status ==="
          docker compose ps

          echo ""
          echo "=== Recent App Logs ==="
          docker compose logs app --tail=20 || echo "No logs available"

          echo ""
          echo "=== API Health Check ==="
          curl -s http://localhost:3005/api/health 2>/dev/null || echo "Health endpoint not available (this is OK)"

          echo ""
          echo "Verification completed"
          VERIFY_EOF

      - name: Deployment Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging (Ubuntu Docker)" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed At:** ${{ steps.deploy-info.outputs.deploy-time }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ steps.deploy-info.outputs.commit-author }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Message:** ${{ steps.deploy-info.outputs.commit-msg }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** http://10.0.0.56:3005" >> $GITHUB_STEP_SUMMARY
