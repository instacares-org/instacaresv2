name: Emergency Production Deploy

on:
  # REMOVED: auto-deploy on push to main was deploying untested code to production
  # push:
  #   branches: [ main ]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "emergency" to confirm emergency deploy (bypasses CI quality gates)'
        required: true
        type: string

jobs:
  deploy:
    name: Emergency Deploy to Hostinger
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://instacares.net

    steps:
      - name: Verify emergency deploy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "emergency" ]; then
            echo "ERROR: You must type 'emergency' to use this workflow."
            echo "For normal deployments, use the 'Production Deploy' workflow instead."
            exit 1
          fi
          echo "Emergency deployment confirmed by ${{ github.actor }}"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Deploy to Server
        run: |
          echo "Starting emergency deployment..."

          SSH_HOST="${{ secrets.HOSTINGER_HOST }}"
          SSH_USER="${{ secrets.HOSTINGER_USER }}"
          SSH_PORT="${{ secrets.HOSTINGER_PORT || 22 }}"

          # Step 1: Stop all services and free ports
          echo "Stopping all services and freeing ports..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} << 'EOF'
            cd /var/www/instacaresv2
            # Stop PM2 processes if they exist
            if pm2 list >/dev/null 2>&1; then
              pm2 stop all 2>/dev/null || true
              pm2 delete all 2>/dev/null || true
            fi
            # Kill PM2 daemon if it exists
            pm2 kill 2>/dev/null || true
            # Kill any lingering node processes
            pkill -f 'node.*3000' 2>/dev/null || true
            pkill -f 'node.*3005' 2>/dev/null || true
            pkill -f 'node.*3007' 2>/dev/null || true
            sleep 2
            echo "Services stopped successfully"
          EOF

          # Step 2: Backup production environment
          echo "Backing up production environment..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && cp .env .env.backup.$(date +%Y%m%d-%H%M%S) 2>/dev/null || true"

          # Step 3: Update code
          echo "Updating code..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && git pull origin main"

          # Step 4: Restore production environment
          echo "Restoring production environment..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && if [ -f .env.production ]; then cp .env.production .env; echo 'Production .env restored'; else echo 'No .env.production found - using default'; fi"

          # Step 5: Install dependencies
          echo "Installing dependencies..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && npm install"

          # Step 6: Build
          echo "Building..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && npm run build"

          # Step 7: Check nginx status (optional)
          echo "Checking nginx status..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} << 'EOF'
            cd /var/www/instacaresv2
            if [ -f scripts/check-nginx.sh ]; then
              chmod +x scripts/check-nginx.sh
              ./scripts/check-nginx.sh || true
            else
              echo "Nginx check skipped - continuing with deployment"
            fi
          EOF

          # Step 8: Start services using ecosystem config
          echo "Starting services..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} "cd /var/www/instacaresv2 && pm2 start ecosystem.config.js --env production && pm2 save"

          # Step 9: Verify deployment
          echo "Verifying deployment..."
          ssh -o StrictHostKeyChecking=no -p ${SSH_PORT} ${SSH_USER}@${SSH_HOST} << 'EOF'
            echo "PM2 Process Status:"
            pm2 status || echo "PM2 status check failed"

            echo ""
            echo "Testing local connection..."
            if curl -I http://localhost:3005 2>/dev/null | head -n 1 | grep -q "200\|301\|302"; then
              echo "Local connection successful"
            else
              echo "Local connection test failed (this might be normal during startup)"
            fi

            echo ""
            echo "Testing external connection..."
            if curl -I https://instacares.net 2>/dev/null | head -n 1 | grep -q "200\|301\|302\|304"; then
              echo "External connection successful"
            else
              echo "External connection test failed"
            fi

            echo ""
            echo "Final PM2 list:"
            pm2 list || true

            # Check if main app is running
            if pm2 list | grep -q "instacares.*online"; then
              echo ""
              echo "InstaCares application is running!"
              exit 0
            else
              echo ""
              echo "InstaCares might not be running, checking logs..."
              pm2 logs instacares --lines 10 --nostream 2>/dev/null || true
              exit 0
            fi
          EOF

          echo ""
          echo "Emergency deployment workflow completed!"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Emergency Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | EMERGENCY (bypassed CI quality gates) |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | [https://instacares.net](https://instacares.net) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
