name: Promote to Production

on:
  workflow_dispatch:

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: diff
        run: |
          git fetch origin main develop
          COMMITS=$(git log origin/main..origin/develop --oneline)
          if [ -z "$COMMITS" ]; then
            echo "No new commits to promote. develop is up to date with main."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          CHANGELOG=$(git log origin/main..origin/develop --pretty=format:"- %s (%h)" --reverse)
          echo "commit_count=$(git log origin/main..origin/develop --oneline | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.txt)
          DATE=$(date +%Y-%m-%d)
          COMMIT_COUNT=${{ steps.diff.outputs.commit_count }}

          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Release PR #${EXISTING} already exists. Updating..."
            gh pr edit "$EXISTING" --body "$(cat <<PREOF
          ## Release to Production - ${DATE}

          **${COMMIT_COUNT} commits** from develop to main

          ### Changes
          ${CHANGELOG}

          ### Deployment
          Once merged, production deploys automatically to instacares.net.

          ### Pre-merge Checklist
          - [ ] Changes tested on staging (instacares.com)
          - [ ] No broken features on staging

          ---
          Auto-generated by Promote to Production workflow
          PREOF
          )"
            echo "Updated PR #${EXISTING}"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head develop \
            --title "Release ${DATE}: ${COMMIT_COUNT} changes to production" \
            --body "$(cat <<PREOF
          ## Release to Production - ${DATE}

          **${COMMIT_COUNT} commits** from develop to main

          ### Changes
          ${CHANGELOG}

          ### Deployment
          Once merged, production deploys automatically to instacares.net.

          ### Pre-merge Checklist
          - [ ] Changes tested on staging (instacares.com)
          - [ ] No broken features on staging

          ---
          Auto-generated by Promote to Production workflow
          PREOF
          )")
          echo "Created PR: ${PR_URL}"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.has_changes }}" = "false" ]; then
            echo "## No Changes to Promote" >> $GITHUB_STEP_SUMMARY
            echo "develop is already up to date with main." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Release PR Created" >> $GITHUB_STEP_SUMMARY
            echo "- **Commits:** ${{ steps.diff.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Next step:** Review and merge the PR" >> $GITHUB_STEP_SUMMARY
          fi
