# ============================================
# INSTACARES PRODUCTION - ENHANCED NGINX CONFIGURATION
# Security hardened with rate limiting, headers, and bot protection
# Cloudflare-only access enabled for IP protection
# ============================================

server {
    server_name instacares.com www.instacares.com instacares.net www.instacares.net instacares.ca www.instacares.ca;
    client_max_body_size 10M;

    # ==========================================
    # CLOUDFLARE-ONLY ACCESS (Hide Server IP)
    # Only allow connections from Cloudflare IPs
    # ==========================================
    # Cloudflare IPv4
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    # Cloudflare IPv6
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # User IPv6 ranges (real IP passed via CF-Connecting-IP header)
    allow 2605:8d80:680:a704::/64;
    allow 2607:fea8:11e4:ea00::/64;
    # Deny all other IPs - Only Cloudflare can connect
    deny all;

    # ==========================================
    # SECURITY HEADERS (applied to all responses)
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy (with full Mapbox support)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://maps.googleapis.com https://api.mapbox.com https://*.mapbox.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com https://*.mapbox.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' https://api.stripe.com https://*.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com wss: ws:; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:; child-src blob:; object-src 'none'; base-uri 'self';" always;

    # ==========================================
    # BOT AND ATTACK BLOCKING
    # ==========================================
    if ($bad_bot) {
        return 403;
    }

    if ($bad_method) {
        return 405;
    }

    # Block common attack patterns in URLs
    location ~* (\.(git|env|htaccess|htpasswd|ini|log|sh|sql|bak|old|swp|tmp)$) {
        deny all;
        return 404;
    }

    # Block WordPress/PHP attack patterns
    location ~* (wp-admin|wp-login|wp-content|wp-includes|xmlrpc|phpmyadmin|adminer|\.php$) {
        deny all;
        return 404;
    }

    # Block common exploit paths
    location ~* (\.\.\/) {
        deny all;
        return 403;
    }

    # ==========================================
    # PUBLIC ASSETS (no rate limiting)
    # ==========================================

    # Logo for email clients
    location = /logo.png {
        alias /var/www/instacaresv2/public/logo.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location = /logo-optimized.png {
        alias /var/www/instacaresv2/public/logo-optimized.png;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Serve uploaded files directly
    location /uploads/ {
        alias /var/www/instacaresv2/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;

        # Prevent script execution in uploads
        location ~* \.(php|cgi|pl|py|sh|bash)$ {
            deny all;
        }
    }

    # Static files caching
    location /_next/static/ {
        proxy_pass http://localhost:3005;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        proxy_pass http://localhost:3005;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ==========================================
    # AUTHENTICATION ENDPOINTS (strict rate limiting)
    # ==========================================
    location ~ ^/api/auth/(signin|signup|register|login|forgot-password|reset-password) {
        limit_req zone=auth burst=3 nodelay;
        limit_conn addr 5;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # API ENDPOINTS (moderate rate limiting)
    # ==========================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn addr 20;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # API timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # NETDATA MONITORING
    # ==========================================
    location /netdata/ {
        limit_req zone=strict burst=5 nodelay;

        proxy_pass http://127.0.0.1:19999/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        auth_basic "Monitoring Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd_netdata;
    }

    # ==========================================
    # WEBSOCKET (Socket.IO)
    # ==========================================
    location /socket.io/ {
        limit_conn addr 10;

        proxy_pass http://localhost:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/socket/ {
        proxy_pass http://localhost:3006/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # MAIN APPLICATION (general rate limiting)
    # ==========================================
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_conn addr 30;

        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ==========================================
    # SSL CONFIGURATION
    # ==========================================
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/instacares.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instacares.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ==========================================
# HTTP to HTTPS Redirect (Cloudflare only)
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name instacares.com www.instacares.com instacares.net www.instacares.net instacares.ca www.instacares.ca;

    # Only allow Cloudflare IPs
    # Cloudflare IPv4
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    # Cloudflare IPv6
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # User IPv6 ranges (real IP passed via CF-Connecting-IP header)
    allow 2605:8d80:680:a704::/64;
    allow 2607:fea8:11e4:ea00::/64;
    deny all;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# NOTE: Default server block is handled by trading_journal config
# Direct IP access is already blocked there
